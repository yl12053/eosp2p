name: Build Native Binary for EOS Service Wrapper

on:
  workflow_dispatch:
    inputs:
      debug:
        description: "Debug build"
        required: false
        type: boolean
        default: false

jobs:
  build_win_and_linux:
    runs-on: {{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_prefix: linux
            ext: .so
            win_artifact: true
            win_artifact_prefix: win
            win_ext: .dll
          - os: macos-latest
            artifact_name: mac
            ext: .dylib

    steps:
      - uses: actions/checkout@v6

      - name: Download JNI Header
        run: git clone https://github.com/Casterlabs/jni-headers.git

      - name: Restore EOS SDK Cache
        id: cache-eos-sdk-ubuntu
        uses: actions/cache/restore@v5
        with:
          path: "EOSSDK"
          key: ${{ runner.os }}-eos

      - name: Download SDK
        run: |
          mkdir -p EOSSDK
          'curl -L "https://onlineservices.epicgames.com/api/cosmos/sdk/download?archive_id=870&archive_type=sdk" --output EOSSDK/out.zip'

      - name: Unzip SDK
        run: unzip EOSSDK/out.zip -d EOSSDK

      - name: Save EOS SDK in Cache
        id: restore-eos-sdk-ubuntu
        uses: actions/cache/save@v5
        with:
          path: "EOSSDK"
          key: ${{ runner.os }}-eos

      - name: Install Compilers in Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo apt-get install -y mingw-w64
          sudo apt-get install -y gcc-aarch64-mingw-w64 g++-aarch64-mingw-w64
          sudo apt-get install patchelf

      - name: Compile (Linux & Windows)
        if: runner.os == 'Linux'
        run: |
          DO_DEBUG_ARG = ""
          if [ "${{ inputs.debug }}" == "true" ]; then
            DO_DEBUG_ARG = "-g"
          fi
          g++ -O3 -march=x86-64 -fno-plt -ffunction-sections -fdata-sections -fno-exceptions -fno-rtti $DO_DEBUG_ARG -IEOSSDK/SDK/Include -I"jni-headers/versions/17/include" -I"jni-headers/versions/17/include/linux" -std=c++20 -static-libgcc -static-libstdc++ -fPIC -shared -l:${{ github.workspace }}src/main/cpp/Bin/libEOSSDK-Linux-Shipping.so Main.cpp -o eosp2p_linuxx64.so
          g++-aarch64-linux-gnu -O3 -march=aarch64 -fno-plt -ffunction-sections -fdata-sections -fno-exceptions -fno-rtti $DO_DEBUG_ARG -IEOSSDK/SDK/Include -I"jni-headers/versions/17/include" -I"jni-headers/versions/17/include/linux" -std=c++20 -static-libgcc -static-libstdc++ -fPIC -shared -l:${{ github.workspace }}src/main/cpp/Bin/libEOSSDK-Linux-Shippingarm64.so Main.cpp -o eosp2p_linuxarm64.so
          x86_64-w64-mingw32-g++ -O3 -march=x86-64 -fno-plt -ffunction-sections -fdata-sections -fno-exceptions -fno-rtti $DO_DEBUG_ARG -IEOSSDK/SDK/Include -I"jni-headers/versions/17/include" -I"jni-headers/versions/17/include/win32" -std=c++20 -static-libgcc -static-libstdc++ -static -shared -l:${{ github.workspace }}src/main/cpp/Bin/EOSSDK-Win64-Shipping.dll Main.cpp -o mainx64.dll
          g++-aarch64-mingw-w64 -O3 -march=aarch64 -fno-plt -ffunction-sections -fdata-sections -fno-exceptions -fno-rtti $DO_DEBUG_ARG -IEOSSDK/SDK/Include -I"jni-headers/versions/17/include" -I"jni-headers/versions/17/include/win32" -std=c++20 -static-libgcc -static-libstdc++ -static -shared -l:${{ github.workspace }}src/main/cpp/Bin/EOSSDK-Win64-Shippingarm64.dll Main.cpp -o mainarm64.dll

      - name: Compile (MacOS)
        if: runner.os == 'macOS'
        run: |
          export MACOSX_DEPLOYMENT_TARGET=11.0
          DO_DEBUG_ARG = ""
          if [ "${{ inputs.debug }}" == "true" ]; then
            DO_DEBUG_ARG = "-g"
          fi
          clang++ -O3 -arch x86_64 -fno-plt -ffunction-sections -fdata-sections -fno-exceptions -fno-rtti $DO_DEBUG_ARG -IEOSSDK/SDK/Include -I"jni-headers/versions/17/include" -I"jni-headers/versions/17/include/darwin" -std=c++20 -dynamiclib -fPIC -install_name @rpath/eosp2p_mac.dylib -l:${{ github.workspace }}src/main/cpp/Bin/libEOSSDK-Mac-Shipping.dylib Main.cpp -o macx64.dylib
          clang++ -O3 -arch arm64 -fno-plt -ffunction-sections -fdata-sections -fno-exceptions -fno-rtti $DO_DEBUG_ARG -IEOSSDK/SDK/Include -I"jni-headers/versions/17/include" -I"jni-headers/versions/17/include/darwin" -std=c++20 -dynamiclib -fPIC -install_name @rpath/eosp2p_mac.dylib -l:${{ github.workspace }}src/main/cpp/Bin/libEOSSDK-Mac-Shipping.dylib Main.cpp -o macarm64.dylib
          lipo -create -output eosp2p_mac.dylib macx64.dylib macarm64.dylib
          

      - name: Patch (Linux & Windows)
        if: runner.os == 'Linux'
        run: |
          python3 ${{ github.workspace }}/src/main/python/edit_import_table.py mainx64.dll eosp2p_winx64.dll EOSSDK-Win64-Shipping.dll eosp2p_eos.dll
          python3 ${{ github.workspace }}/src/main/python/edit_import_table.py mainarm64.dll eosp2p_winarm64.dll EOSSDK-Win64-Shippingarm64.dll eosp2p_eos.dll
          patchelf --replace-needed libEOSSDK-Linux-Shipping.so eosp2p_eos.so eosp2p_linuxx64.so
          patchelf --replace-needed libEOSSDK-LinuxArm64-Shipping.so eosp2p_eos.so eosp2p_linuxarm64.so

      - name: Patch (MacOS)
        if: runner.os == 'macOS'
        run: |
          install_name_tool -change @rpath/libEOSSDK-Mac-Shipping.dylib @rpath/eosp2p_eos.dylib eosp2p_mac.dylib
          install_name_tool -id @rpath/eosp2p_eos.dylib EOSSDK/SDK/Bin/libEOSSDK-Mac-Shipping.dylib

      - name: Upload Artifact (Linux & Windows)
        uses: actions/upload-artifact@v7
        if: runner.os == 'Linux'
        with:
          name: linux-and-win
          path: |
            eosp2p_linuxx64.so
            eosp2p_linuxarm64.so
            eosp2p_winx64.dll
            eosp2p_winarm64.dll

      - name: Upload Artifact (MacOS)
        uses: actions/upload-artifact@v7
        if: runner.os == 'macOS'
        with:
          name: macos
          path: |
            eosp2p_mac.dylib
            EOSSDK/SDK/Bin/libEOSSDK-Mac-Shipping.dylib